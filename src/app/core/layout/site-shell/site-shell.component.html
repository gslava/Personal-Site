<div class="site-shell">
  <header #siteHeader class="site-header">
    <div class="site-header__spacer" aria-hidden="true"></div>

    <button
      type="button"
      class="site-header__home-button"
      [attr.aria-label]="scrollTopLabel()"
      (click)="scrollToTop()"
    >
      <img class="site-header__home-icon" src="fox.png" alt="" />
    </button>

    <nav class="locale-switcher" [attr.aria-label]="localeSwitcherLabel()">
      @for (locale of localeService.localeLinks(); track locale.code) {
        <a
          class="locale-switcher__link"
          [class.locale-switcher__link--active]="locale.isActive"
          [href]="locale.href"
          [attr.lang]="locale.code"
          [attr.hreflang]="locale.code"
          data-locale-link
          [attr.data-locale-code]="locale.code"
        >
          {{ locale.label }}
        </a>
      }
    </nav>
  </header>

  <main class="site-main">
    <router-outlet />
  </main>
</div>
