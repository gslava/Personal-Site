<div class="home-page">
  <section class="home-page__hero">
    <app-particle-sphere class="home-page__scene"></app-particle-sphere>

    <div class="home-page__hero-overlay">
      <div class="home-page__index-card">
        <nav class="home-page__index-nav" [attr.aria-label]="copy().contentAriaLabel">
          @for (section of sections(); track trackSection($index, section)) {
            <a class="home-page__index-link" [href]="sectionHref(section.id)">
              <span class="home-page__index-link-title">{{ section.title }}</span>
            </a>
          }
        </nav>
      </div>
    </div>
  </section>

  <div class="home-page__sections" [attr.aria-label]="copy().contentAriaLabel">
    @for (section of sections(); track trackSection($index, section); let last = $last) {
      <section [attr.id]="section.id" class="home-page__section-card" appScrollReveal appReactiveGlassCard>
        <div class="home-page__prose" [innerHTML]="section.html"></div>
      </section>

      @if (!last) {
        <div class="home-page__divider" aria-hidden="true" appScrollReveal>
          <span class="home-page__divider-line"></span>
          <img class="home-page__divider-fox" src="fox.png" alt="" />
          <span class="home-page__divider-line"></span>
        </div>
      }
    }
  </div>
</div>
