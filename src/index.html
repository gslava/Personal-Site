<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title i18n="@@meta.appTitle">HOME</title>
    <base href="/" />
    <meta
      name="description"
      i18n-content="@@meta.description"
      content="Personal site with an Angular 21 home page, a reference-driven particle sphere, and markdown-powered content sections."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" sizes="256x256" href="favicon.png?v=2" />
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico?v=2" />
    <script src="locale-bootstrap.js"></script>
    <script>
      (() => {
        const hash = window.location.hash.slice(1);

        if (!hash) {
          return;
        }

        const startedAt = Date.now();
        const timerId = window.setInterval(() => {
          const target = document.getElementById(hash);

          if (!target) {
            if (Date.now() - startedAt > 4000) {
              window.clearInterval(timerId);
            }

            return;
          }

          const headerHeight =
            Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--site-header-height')) ||
            92;

          window.scrollTo({
            top: Math.max(0, target.getBoundingClientRect().top + window.scrollY - headerHeight - 16),
            behavior: 'auto',
          });

          if (Math.abs(target.getBoundingClientRect().top - (headerHeight + 16)) < 24 || Date.now() - startedAt > 4000) {
            window.clearInterval(timerId);
          }
        }, 180);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
